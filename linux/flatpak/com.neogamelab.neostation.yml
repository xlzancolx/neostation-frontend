app-id: com.neogamelab.neostation
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: neostation

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets

cleanup:
  - /include
  - /lib/pkgconfig
  - '*.la'
  - '*.a'

modules:
  - name: neostation
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - export PATH=$PWD/flutter/bin:$PATH
      - flutter config --no-analytics
      - flutter precache --linux
      - flutter pub get
      - flutter build linux --release
      - mkdir -p /app/bin
      - cp -r build/linux/x64/release/bundle/* /app/bin/
      - chmod +x /app/bin/neostation
      - install -Dm644 linux/flatpak/com.neogamelab.neostation.desktop /app/share/applications/com.neogamelab.neostation.desktop
      - install -Dm644 linux/flatpak/com.neogamelab.neostation.metainfo.xml /app/share/metainfo/com.neogamelab.neostation.metainfo.xml
      - |
        for size in 64 128 256; do
          mkdir -p /app/share/icons/hicolor/${size}x${size}/apps
          cp assets/images/logo.png /app/share/icons/hicolor/${size}x${size}/apps/com.neogamelab.neostation.png
        done
    sources:
      - type: dir
        path: .
      - type: archive
        url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.0-stable.tar.xz
        sha256: PLACEHOLDER_RUN_get-flutter-sha256.sh
        dest: .
        strip-components: 0
