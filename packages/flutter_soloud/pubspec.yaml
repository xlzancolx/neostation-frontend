name: flutter_soloud
resolution: workspace
description: >-
  A low-level audio plugin for Flutter,
  mainly meant for games and immersive apps.
  Based on the SoLoud (C++) audio engine.
version: 3.5.2
homepage: https://github.com/alnitak/flutter_soloud
maintainer: Marco Bavagnoli (@lildeimos)
platforms:
  android:
  linux:
  macos:
  windows:
topics:
  - audio
  - player
  - games

environment:
  sdk: '>=3.9.2'
  flutter: '>=3.3.0'

dependencies:
  ffi: ^2.1.4
  flutter:
    sdk: flutter
  http: ^1.3.0
  logging: ^1.3.0
  meta: ^1.15.0
  path: ^1.9.0
  path_provider: ^2.1.5
  plugin_platform_interface: ^2.1.8
  web: ^1.1.0

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  test: ^1.31.0
  very_good_analysis: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
